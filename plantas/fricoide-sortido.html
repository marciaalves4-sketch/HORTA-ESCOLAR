<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fricoide Sortido - Jardim da Biodiversidade</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
    background:#f8fff5;
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}

.topo{
    background:linear-gradient(135deg,#66bb6a,#81c784,#aed581);
    color:white;
    text-align:center;
    padding:50px 20px;
}

.topo h1{
    font-size:48px;
    margin-bottom:10px;
}

.topo p{
    font-size:22px;
}

.selo{
    display:inline-block;
    margin-top:20px;
    background:white;
    color:#2e7d32;
    padding:10px 25px;
    border-radius:30px;
    font-weight:bold;
}

.conteudo{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.foto{
    text-align:center;
}

.foto img{
    width:450px;
    max-width:100%;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.25);
}

.card{
    background:white;
    margin:25px 0;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.12);
}

</style>

</head>

<body>

<header class="topo">

<h1>🟤 Fricoide Sortido</h1>

<p>Jardim da Biodiversidade</p>

<div class="selo">

🌿 Horta Escolar Viva

</div>

</header>

<section class="conteudo">

<div class="foto">

<img src="../fricoide-sortido.jpg.jpeg" alt="Fricoide Sortido">

</div>
